<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paper Connection Audit</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --line: #2a2f3a;
    --text: #e6e8ec; --muted: #9aa3b2; --accent: #3673f7;
    --green: #65C161; --orange: #E87626; --red: #D51A2C; --grey: #6b7280;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #app { display: grid; grid-template-columns: 330px 1fr 340px; height: 100vh; }
  .col { overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  #left { border-right: 1px solid var(--line); background: var(--panel); }
  #right { border-left: 1px solid var(--line); background: var(--panel); }
  #center { position: relative; }
  header { padding: 12px 14px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 14px; margin: 0 0 2px; letter-spacing: .2px; }
  header .sub { color: var(--muted); font-size: 11px; }
  .scroll { overflow-y: auto; flex: 1; min-height: 0; }
  .section { padding: 10px 14px; border-bottom: 1px solid var(--line); }
  .section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); margin: 0 0 8px; }
  .section.collapsible { padding: 0; }
  .section.collapsible .section-head {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    width: 100%; padding: 10px 14px; background: none; border: none; color: inherit;
    cursor: pointer; text-align: left;
  }
  .section.collapsible .section-head:hover h2 { color: var(--text); }
  .section.collapsible .section-head h2 { margin: 0; transition: color .12s; }
  .section.collapsible .section-chevron {
    color: var(--muted); font-size: 10px; line-height: 1; flex: none;
    transition: transform .15s ease;
  }
  .section.collapsible.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsible .section-body { padding: 0 14px 10px; }
  .section.collapsible.collapsed .section-body { display: none; }
  label.chk { display: flex; align-items: center; gap: 7px; padding: 3px 0; cursor: pointer; }
  label.chk input { accent-color: var(--accent); }
  .attrdot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .attrsq { width: 9px; height: 9px; flex: none; border-radius: 2px; }
  .row { display: flex; gap: 8px; align-items: center; margin: 6px 0; }
  .row label { color: var(--muted); flex: none; min-width: 92px; }
  input[type=text], input[type=number], select {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 8px; width: 100%; font-size: 12px; }
  #fSearch { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  #fEmailRegex { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .regex-field { position: relative; flex: 1; min-width: 0; }
  .regex-presets { display: flex; flex-wrap: wrap; gap: 5px; margin: 4px 0 2px 100px; }
  .regex-chip {
    background: var(--panel2); color: var(--muted); border: 1px solid var(--line);
    border-radius: 12px; padding: 2px 8px; font-size: 10px; cursor: pointer;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .regex-chip:hover { color: var(--text); border-color: var(--accent); }
  .regex-suggest {
    display: none; position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 30;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 6px;
    max-height: 160px; overflow-y: auto; box-shadow: 0 6px 18px #0008;
  }
  .regex-suggest.open { display: block; }
  .regex-suggest button {
    display: block; width: 100%; text-align: left; background: none; border: none;
    color: var(--text); padding: 6px 8px; cursor: pointer; font-size: 11px;
  }
  .regex-suggest button:hover, .regex-suggest button.sel { background: #232a3a; }
  .regex-suggest .pat { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--accent); }
  .regex-suggest .hint { color: var(--muted); font-size: 10px; margin-left: 6px; }
  .bucket { padding: 8px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .bucket:hover { background: var(--panel2); }
  .bucket.sel { background: #232a3a; box-shadow: inset 3px 0 0 var(--accent); }
  .bucket .b1 { display: flex; align-items: center; gap: 7px; }
  .bucket .val { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bucket .b2 { color: var(--muted); font-size: 11px; margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--panel2); border: 1px solid var(--line); }
  .pill.warn { color: var(--orange); border-color: var(--orange); }
  .pill.bad { color: var(--red); border-color: var(--red); }
  canvas { display: block; width: 100%; height: 100%; }
  #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; color: var(--muted); pointer-events: none; padding: 24px; }
  #cvTip { position: absolute; display: none; z-index: 20; pointer-events: none; max-width: 260px;
    background: #0f1115f2; border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px;
    font-size: 11px; color: var(--text); box-shadow: 0 4px 14px #000a; }
  #cmpTip {
    position: fixed; display: none; z-index: 60; pointer-events: none; max-width: 360px;
    background: #0f1115f5; border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px;
    font-size: 11px; color: var(--text); box-shadow: 0 6px 18px #000c; line-height: 1.35;
  }
  #topbar { position: absolute; top: 0; left: 0; right: 0; padding: 8px 12px; display: flex;
    gap: 8px; align-items: center; background: linear-gradient(#0f1115ee, #0f111500);
    pointer-events: none; font-size: 12px; }
  #topbar .btn, #topbar .crumb { pointer-events: auto; }
  .btn { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
  .btn:hover { border-color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: default; }
  .crumb { color: var(--muted); }
  .crumb b { color: var(--text); }
  .legend { position: absolute; bottom: 10px; left: 12px; display: flex; gap: 12px; flex-wrap: wrap;
    font-size: 11px; color: var(--muted); background: #0f1115cc; padding: 6px 10px; border-radius: 8px; max-width: 70%; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .sq { width: 9px; height: 9px; border-radius: 2px; }
  .dl { margin: 0; }
  .dl div { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--line); }
  .dl dt { color: var(--muted); flex: none; width: 108px; }
  .dl dd { margin: 0; word-break: break-word; }
  .conn { padding: 7px 0; border-bottom: 1px solid var(--line); }
  .conn .ch { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .conn .cids { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 5px; }
  .conn.hit { background: #232a3a; border-radius: 4px; box-shadow: inset 3px 0 0 var(--accent); padding-left: 6px; margin-left: -6px; }
  .aid { font-family: ui-monospace, monospace; font-size: 11px; color: var(--accent); cursor: pointer; text-decoration: none; }
  .aid:hover { text-decoration: underline; }
  .muted { color: var(--muted); }
  .empty { padding: 24px 14px; color: var(--muted); text-align: center; }
  .count { color: var(--muted); font-size: 11px; }
  /* compare bottom panel */
  #modal { position: fixed; inset: 0; z-index: 50; display: none; pointer-events: none; }
  #modal.open { display: block; pointer-events: auto; }
  #modal .cmp-backdrop {
    position: absolute; inset: 0; background: #00000066;
    opacity: 0; transition: opacity .22s ease;
  }
  #modal.open .cmp-backdrop { opacity: 1; }
  .modalbox {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: calc(100vh - 36px);
    background: var(--panel); border-top: 1px solid var(--line);
    border-radius: 12px 12px 0 0; display: flex; flex-direction: column;
    box-shadow: 0 -10px 40px #00000055;
    transform: translateY(100%); transition: transform .24s ease;
  }
  #modal.open .modalbox { transform: translateY(0); }
  .cmp-drag {
    flex: none; height: 5px; width: 44px; margin: 8px auto 0;
    border-radius: 3px; background: var(--line);
  }
  .modalhead { padding: 10px 16px 12px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; flex: none; }
  .modalhead h2 { margin: 0; font-size: 14px; }
  .modalbody { overflow: auto; flex: 1; min-height: 0; }
  table.cmp { border-collapse: collapse; font-size: 12px; width: 100%; }
  table.cmp th, table.cmp td { border: 1px solid var(--line); padding: 5px 8px; text-align: left; white-space: nowrap;
    max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
  table.cmp td[data-col="articleType"] { max-width: 52px; text-align: center; font-weight: 600; letter-spacing: .03em; }
  table.cmp td[data-col="status"] { max-width: 48px; text-align: center; font-weight: 600; letter-spacing: .03em; }
  table.cmp td[data-col="nameEmailSim"] { max-width: 56px; text-align: center; font-weight: 600; }
  table.cmp td[data-col="journal"] { max-width: 140px; }
  table.cmp td[data-col="section"] { max-width: 120px; }
  table.cmp td[data-col="authorEmail"] { max-width: 160px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
  table.cmp td.cmp-tip { cursor: default; }
  table.cmp thead th { position: sticky; top: 0; background: var(--panel2); z-index: 1; }
  table.cmp th[data-sort] { cursor: grab; }
  table.cmp th[data-sort].drag-over { outline: 1px dashed var(--accent); outline-offset: -2px; }
  table.cmp td.share { font-weight: 600; }
  table.cmp tr:hover td { background: #ffffff08; }
  table.cmp tr.sel td { background: #232a3a; box-shadow: inset 3px 0 0 var(--accent); }
  table.cmp tr.sel:hover td { background: #232a3a; }
  table.cmp tbody tr[data-r] { cursor: pointer; }
  table.cmp td.cmp-pick, table.cmp th.cmp-pick { width: 28px; text-align: center; padding: 4px; }
  table.cmp tr.cmp-picked td { box-shadow: inset 2px 0 0 #D51A2C; }
  .cmp-bulk {
    flex: none; padding: 10px 16px 12px; border-top: 1px solid var(--line);
    background: var(--panel2); display: none; gap: 10px; align-items: flex-end; flex-wrap: wrap;
  }
  .cmp-bulk.visible { display: flex; }
  .cmp-bulk textarea {
    flex: 1; min-width: 200px; min-height: 40px; max-height: 80px;
    background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 12px; resize: vertical;
  }
  .cmp-bulk .cmp-bulk-count { font-size: 12px; min-width: 88px; }
  .close { margin-left: auto; }
</style>
</head>
<body>
<div id="app">
  <div id="left" class="col">
    <header>
      <h1>Paper Connection Audit</h1>
      <div class="sub" id="meta">loading…</div>
    </header>
    <div class="section collapsible" id="secConnTypes">
      <button type="button" class="section-head" id="secConnTypesHead" aria-expanded="true" aria-controls="secConnTypesBody">
        <h2>Connection type</h2>
        <span class="section-chevron" aria-hidden="true">▾</span>
      </button>
      <div class="section-body" id="secConnTypesBody">
        <div id="attrToggles"></div>
      </div>
    </div>
    <div class="section collapsible" id="secFilters">
      <button type="button" class="section-head" id="secFiltersHead" aria-expanded="true" aria-controls="secFiltersBody">
        <h2>Filters</h2>
        <span class="section-chevron" aria-hidden="true">▾</span>
      </button>
      <div class="section-body" id="secFiltersBody">
      <label class="chk"><input type="checkbox" id="fDiffAuthors" checked> Different submitting authors</label>
      <label class="chk"><input type="checkbox" id="fDiffOrgs" checked> Different organisations</label>
      <label class="chk"><input type="checkbox" id="fFlaggedOnly"> <span style="color:#D51A2C">⚑</span> Only clusters with a flagged paper</label>
      <label class="chk"><input type="checkbox" id="fHideAllRejected" checked> Hide all-rejected clusters</label>
      <label class="chk" id="lowNameEmailRow" style="display:none"><input type="checkbox" id="fLowNameEmailSim"> Low name/email similarity (&lt;20%)</label>
      <div class="row" id="journalRow"><label>Journal</label><select id="fJournal" disabled><option value="">All journals</option></select></div>
      <div class="row" id="statusRow"><label>Status</label>
        <select id="fStatus" disabled>
          <option value="">Any status</option>
          <option value="rej">Rejected only</option>
          <option value="not">Active only</option>
        </select>
      </div>
      <div class="muted" id="metaFilterNote" style="font-size:11px;margin-top:4px;display:none"></div>
      <div class="row"><label>Min papers</label><input type="number" id="fMinSize" value="2" min="2" style="width:70px"></div>
      <div class="row"><label>Sort by</label>
        <select id="fSort">
          <option value="size">Most papers</option>
          <option value="authors">Most distinct authors</option>
          <option value="orgs">Most distinct organisations</option>
        </select>
      </div>
      <div class="row"><label>Search</label><input type="text" id="fSearch" placeholder="article ids (comma / tab / line) or connection value"></div>
      <div class="row"><label>Email regex</label>
        <div class="regex-field">
          <input type="text" id="fEmailRegex" placeholder="regex on full email" autocomplete="off" spellcheck="false">
          <div class="regex-suggest" id="emailRegexSuggest" role="listbox"></div>
        </div>
      </div>
      <div class="regex-presets" id="emailRegexChips"></div>
      <div id="emailErr" style="color:var(--red);font-size:11px;min-height:14px"></div>
      <div class="row" id="reviewerRow" style="display:none"><label>Reviewer</label><input type="text" id="fReviewer" placeholder="your name (for flags)"></div>
      </div>
    </div>
    <div class="section" style="padding-bottom:6px"><h2 style="margin:0"><span id="listTitle">Connections</span> <span class="count" id="bucketCount"></span></h2></div>
    <div class="scroll" id="bucketList"></div>
  </div>

  <div id="center" class="col">
    <canvas id="cv"></canvas>
    <div id="topbar">
      <button class="btn" id="btnOverview">◂ Overview</button>
      <span class="crumb" id="crumb"></span>
      <span style="flex:1"></span>
      <button class="btn" id="btnFlagged" title="Show flagged papers" style="display:none">⚑ <span id="flagCount">0</span></button>
      <button class="btn" id="btnFlagRefresh" title="Reload flags from server" style="display:none">⟳</button>
      <button class="btn" id="btnCompare">Compare papers</button>
      <button class="btn" id="btnRelayout">Re-layout</button>
    </div>
    <div id="overlay"></div>
    <div id="cvTip"></div>
    <div class="legend" id="legend"></div>
  </div>

  <div id="right" class="col">
    <header><h1 id="detailTitle">Details</h1><div class="sub" id="detailSub">Click a cluster, then a paper.</div></header>
    <div class="scroll" id="detail"><div class="empty">Nothing selected.</div></div>
  </div>
</div>

<div id="modal" aria-hidden="true">
  <div class="cmp-backdrop" id="modalBackdrop"></div>
  <div class="modalbox" role="dialog" aria-labelledby="modalTitle">
    <div class="cmp-drag" aria-hidden="true"></div>
    <div class="modalhead">
      <h2 id="modalTitle">Compare papers</h2>
      <span class="muted" id="modalSub"></span>
      <button class="btn" id="modalCopy" title="Copy table to clipboard (TSV)">Copy</button>
      <button class="btn close" id="modalClose">Close</button>
    </div>
    <div class="modalbody" id="modalBody"></div>
    <div class="cmp-bulk" id="cmpBulkBar">
      <span class="muted cmp-bulk-count" id="cmpBulkCount">0 selected</span>
      <textarea id="cmpBulkComment" placeholder="Reason for bulk flag (optional)" rows="2"></textarea>
      <button class="btn" id="cmpBulkFlag" disabled style="background:#D51A2C;border-color:#D51A2C;color:#fff">Flag selected</button>
      <button class="btn" id="cmpBulkUnflag" disabled>Unflag selected</button>
    </div>
  </div>
</div>

<div id="cmpTip"></div>

<script src="flags-config.js"></script>
<script>
"use strict";
// -------- config (tune here) --------
const NODE_CAP = 400;          // hard cap on rendered nodes (papers + hubs)
const OVERVIEW_HUBS = 140;     // clusters shown in the high-level overview
const SECONDARY_HUBS = 40;     // neighbouring clusters shown when drilling in
const LAYOUT_ITERS = 170;
const DEFAULT_ACTIVE_ATTRS = new Set(["ip", "device", "locale", "wdAuthor"]);
// Name vs email local-part similarity below this % is treated as suspicious (optional filter).
const NAME_EMAIL_SIM_THRESHOLD = 20;
const NAME_EMAIL_SIM_COLORS = { high: "#65C161", med: "#E87626", low: "#D51A2C" };
const nameEmailSimStyle = (sim) => {
  if (sim == null) return null;
  if (sim >= 40) return { color: NAME_EMAIL_SIM_COLORS.high, hint: "Strong name/email match" };
  if (sim >= NAME_EMAIL_SIM_THRESHOLD) return { color: NAME_EMAIL_SIM_COLORS.med, hint: "Partial name/email match" };
  return { color: NAME_EMAIL_SIM_COLORS.low, hint: "Weak name/email match — suspicious" };
};
const nameEmailSimText = (sim) => sim == null ? "—" : `${sim}%`;
const nameEmailSimHtml = (sim) => {
  const sty = nameEmailSimStyle(sim);
  if (sim == null) return '<span class="muted">—</span>';
  const title = sty ? ` title="${escapeHtml(sty.hint)}"` : "";
  return `<span style="color:${sty.color};font-weight:600"${title}>${escapeHtml(nameEmailSimText(sim))}</span>`;
};
// Bump when snapshot.json.gz is rebuilt — busts browser/CDN caches for the data file.
const SNAPSHOT_REV = "20260716T122956";
// Preset email regex patterns (tested against the full author email string).
const EMAIL_REGEX_PRESETS = [
  { label: "Short alpha + digits", pattern: "[a-z]{4,8}\\d{3,6}", hint: "e.g. hilp8387@…" },
  { label: "Numeric local (8–11)", pattern: "\\d{8,11}", hint: "QQ / 163 phone-style IDs" },
  { label: "CN freemail domains", pattern: "@(163|126|qq)\\.com", hint: "163, 126, qq" },
];

// -------- attribute display config --------
const ATTR_META = {
  email:      { label: "Email",              pool: "emails",      color: "#22d3ee" },
  ip:         { label: "IP address",         pool: "ips",         color: "#a78bfa" },
  device:     { label: "Device fingerprint", pool: "devices",     color: "#f472b6" },
  locale:     { label: "Language + timezone",pool: "locales",     color: "#60a5fa" },
  wdAuthor:   { label: "Word: author",       pool: "wdAuthors",   color: "#f59e0b" },
  wdEditedBy: { label: "Word: last edited by",pool: "wdEditedBys",color: "#fbbf24" },
  wdCompany:  { label: "Word: company",      pool: "wdCompanies", color: "#fcd34d" },
  authorIp:   { label: "Author-declared IP", pool: "authorIps",   color: "#c084fc" },
};
const ATTR_COL = { email: "authorEmail" };
const col = (a) => ATTR_COL[a] || a;
const COMBO_COLOR = "#a3e635";
const BAND_COLORS = ["#6b7280", "#65C161", "#E87626", "#D51A2C"];
const BAND_NAMES  = ["no score", "low", "medium", "high"];
const STATUS_NAMES = ["", "green", "yellow", "red", "gold", "n/a", "unchecked"];
const PATTERN_NAMES = ["", "all-digits", "name.surname", "all-alpha", "alpha+digits", "other"];
const CMP_PRIORITY = ["status", "articleType", "authorName", "authorEmail", "nameEmailSim", "authorOrg", "editors", "reviewers", "wdAuthor", "wdEditedBy", "wdStatus", "journal", "section"];
const CMP_REST = ["pmScore", "wdCompany", "device", "ip", "locale", "authorIp"];

// -------- state --------
let D = null, attrs = [];
let indexMap = new Map();     // "attr:ref" -> [rows]
let keptSet = new Set();
let bucketMeta = new Map();   // "attr:ref" -> {rows,nNames,nOrgs}
let buckets = [];
let mode = "overview";        // overview | focus
let focusKey = null;
let selectedBucketKey = null;
let nodes = [], edges = [], adj = [], simEdges = [];
let emailMatch = null;        // Set<rowIdx> whose author email matches the active regex, or null
let selected = null;          // node index highlighted
let searchFocusTimer = null;
let view = { x: 0, y: 0, k: 1 };
// -------- papermill flags (Azure Table Storage backend) --------
const FC = (typeof window !== "undefined" && window.FLAGS_CONFIG) ? window.FLAGS_CONFIG : null;
let flags = new Map();        // articleId -> { by, utc }
const tableUrl = (suffix = "") => `https://${FC.account}.table.core.windows.net/${FC.table}${suffix}`;
const reviewer = () => (($("fReviewer") && $("fReviewer").value.trim()) || "anon");
async function loadFlags() {
  if (!FC) return;
  try {
    const res = await fetch(tableUrl(`()?$filter=PartitionKey%20eq%20'flag'&${FC.sas}`), { headers: { Accept: "application/json;odata=nometadata" } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const j = await res.json();
    flags = new Map(j.value.map(e => [+e.RowKey, { by: e.flaggedBy || "", utc: e.flaggedUtc || e.Timestamp || "", comment: e.comment || "" }]));
  } catch (e) { console.warn("[flags] load failed:", e); }
  updateFlagCount();
}
async function setFlag(id, on, comment) {
  if (!FC) return false;
  const rk = String(id), ent = tableUrl(`(PartitionKey='flag',RowKey='${rk}')?${FC.sas}`);
  try {
    if (on) {
      const existing = flags.get(id);
      const by = existing ? existing.by : reviewer();
      const utc = existing ? existing.utc : new Date().toISOString();
      const cmt = comment != null ? comment : (existing ? existing.comment || "" : "");
      const body = JSON.stringify({ PartitionKey: "flag", RowKey: rk, flaggedBy: by, flaggedUtc: utc, comment: cmt });
      const res = await fetch(ent, { method: "PUT", headers: { "Content-Type": "application/json", Accept: "application/json;odata=nometadata" }, body });
      if (!res.ok) throw new Error("HTTP " + res.status);
      flags.set(id, { by, utc, comment: cmt });
    } else {
      const res = await fetch(ent, { method: "DELETE", headers: { "If-Match": "*" } });
      if (!res.ok && res.status !== 404) throw new Error("HTTP " + res.status);
      flags.delete(id);
    }
    return true;
  } catch (e) { console.warn("[flags] write failed:", e); return false; }
}

async function fetchSnapshot(url) {
  const bust = url + (url.includes("?") ? "&" : "?") + "v=" + encodeURIComponent(SNAPSHOT_REV);
  const res = await fetch(bust, { cache: "no-store" });
  if (!res.ok) throw new Error(`${url}: ${res.status}`);
  if (url.endsWith(".gz")) {
    if (typeof DecompressionStream === "undefined") throw new Error("Browser lacks DecompressionStream (use a current Chrome, Firefox, or Safari)");
    return await new Response(res.body.pipeThrough(new DecompressionStream("gzip"))).json();
  }
  return await res.json();
}

// -------- bucket list --------
// Journal / status filters apply per paper (not “cluster has at least one match”).
function paperMatchesMetaFilter(r) {
  const jr = $("fJournal") ? $("fJournal").value : "";
  if (jr && artJournal(r) !== jr) return false;
  const sta = $("fStatus") ? $("fStatus").value : "";
  if (sta === "rej") return isRejected(r);
  if (sta === "not") return !!artStatus(r) && !isRejected(r);
  if ($("fLowNameEmailSim")?.checked) {
    const sim = A("nameEmailSim", r);
    if (sim == null || sim >= NAME_EMAIL_SIM_THRESHOLD) return false;
  }
  return true;
}
function metaFilteredRows(rows) {
  return rows.filter(paperMatchesMetaFilter);
}
// Article-id search: comma, tab, or line break separated numeric ids (spaces stripped).
const SEARCH_ID_SPLIT = /[\s,;\t]+/;
function parseArticleIdSearch(raw) {
  const trimmed = (raw || "").trim();
  if (!trimmed) return null;
  const parts = trimmed.split(SEARCH_ID_SPLIT).map(s => s.trim()).filter(Boolean);
  if (!parts.length) return null;
  const ordered = [], ids = new Set();
  for (const p of parts) {
    if (!/^\d+$/.test(p)) return null;
    const aid = parseInt(p, 10);
    if (!ids.has(aid)) { ids.add(aid); ordered.push(aid); }
  }
  return { ids, ordered };
}
function rowsMatchArticleSearch(rows, idSearch) {
  return rows.some(r => idSearch.ids.has(A("id", r)));
}
function searchArticleRows(idSearch) {
  const rows = [];
  for (const aid of idSearch.ordered) {
    const r = D.articles.id.indexOf(aid);
    if (r >= 0) rows.push(r);
  }
  return rows.filter(r => paperMatchesMetaFilter(r) && (!$("fFlaggedOnly").checked || isFlagged(r))).slice(0, NODE_CAP);
}
function sharedAttrsBetween(r1, r2) {
  const out = [];
  for (const a of attrs) {
    const v1 = D.articles[col(a)][r1], v2 = D.articles[col(a)][r2];
    if (v1 >= 0 && v1 === v2) out.push(a);
  }
  return out;
}
function searchTextQuery() {
  const raw = $("fSearch").value.trim();
  if (!raw || parseArticleIdSearch(raw)) return "";
  return raw.toLowerCase();
}
function currentBuckets() {
  const act = new Set(activeAttrs());
  const diffA = $("fDiffAuthors").checked, diffO = $("fDiffOrgs").checked;
  const onlyFlagged = $("fFlaggedOnly").checked;
  const minSize = Math.max(2, parseInt($("fMinSize").value) || 2);
  const idSearch = parseArticleIdSearch($("fSearch").value);
  const q = searchTextQuery();
  const sort = $("fSort").value;
  let list = buckets.filter(b => {
    if (!act.has(b.attr)) return false;
    const rows = metaFilteredRows(b.rows);
    if (rows.length < minSize) return false;
    const dc = distinctCounts(rows);
    if (diffA && dc.nNames < 2) return false;
    if (diffO && dc.nOrgs < 2) return false;
    if (onlyFlagged && !rows.some(isFlagged)) return false;
    if (shouldHideAllRejectedCluster(rows)) return false;
    if (idSearch && !rowsMatchArticleSearch(rows, idSearch)) return false;
    if (q && !(strFull(ATTR_META[b.attr].pool, b.ref) || str(ATTR_META[b.attr].pool, b.ref) || "").toLowerCase().includes(q)) return false;
    return true;
  }).map(b => {
    const rows = metaFilteredRows(b.rows);
    const dc = distinctCounts(rows);
    return { attr: b.attr, ref: b.ref, rows, nNames: dc.nNames, nOrgs: dc.nOrgs };
  });
  list.sort((a, b) => sort === "authors" ? b.nNames - a.nNames || b.rows.length - a.rows.length
    : sort === "orgs" ? b.nOrgs - a.nOrgs || b.rows.length - a.rows.length
    : b.rows.length - a.rows.length);

}
function activeEmailRegex() {

  try { const re = new RegExp(raw, "i"); $("emailErr").textContent = ""; return re; }
  catch (e) { $("emailErr").textContent = "Invalid regex: " + e.message; return "ERR"; }
}
// The email regex is treated as its own connection type: it selects the set of

function rebuildEmailFilter() {
  const re = activeEmailRegex();
  if (!re || re === "ERR") { emailMatch = null; return; }
  const emails = D.dict.emails || [], ok = new Uint8Array(emails.length);
  for (let i = 0; i < emails.length; i++) if (re.test(emails[i])) ok[i] = 1;
  const c = D.articles.authorEmail; emailMatch = new Set();
  for (let r = 0; r < c.length; r++) { const ref = c[r]; if (ref >= 0 && ok[ref]) emailMatch.add(r); }
}
const regexOn = () => !!emailMatch;
const emailLabel = () => { const re = activeEmailRegex(); return re && re !== "ERR" ? "Email ~ /" + re.source + "/" : "Email pattern"; };

}

  const c = D.articles.authorEmail, rows = [];
  for (let r = 0; r < c.length; r++) { const ref = c[r]; if (ref >= 0 && match.has(ref)) rows.push(r); }

  const nm = new Set(), og = new Set();
  for (const r of rows) { const a = A("authorName", r); if (a >= 0) nm.add(a); const o = A("authorOrg", r); if (o >= 0) og.add(o); }

const andMode = () => (activeAttrs().length + (regexOn() ? 1 : 0)) >= 2;

// AND: group papers that share the SAME value on EVERY selected attribute.
function computeCombos() {
  const act = activeAttrs(), cols = act.map(a => D.articles[col(a)]), n = D.articles.id.length;
  const groups = new Map();
  for (let r = 0; r < n; r++) {
    if (emailMatch && !emailMatch.has(r)) continue; // email regex acts as an AND filter
    if (!paperMatchesMetaFilter(r)) continue;
    let key = "", ok = true;
    for (let i = 0; i < act.length; i++) { const ref = cols[i][r]; if (ref < 0) { ok = false; break; } key += act[i] + "#" + ref + "|"; }
    if (!ok) continue;
    let g = groups.get(key); if (!g) { g = []; groups.set(key, g); } g.push(r);
  }
  const units = [];
  for (const [key, rows] of groups) {
    if (rows.length < 2) continue;
    const parts = act.map(a => ({ attr: a, ref: D.articles[col(a)][rows[0]] }));
    const dc = distinctCounts(rows);
    units.push({ kind: "combo", key: "combo|" + key, parts, rows, nNames: dc.nNames, nOrgs: dc.nOrgs });
  }

}

function currentUnits() {
  const act = activeAttrs(), rx = regexOn();
  if (act.length === 0) {
    if (!rx) return [];
    // Regex on its own = a cluster per distinct matching email (one node per email).
    const byEmail = new Map();
    for (const r of emailMatch) { const ref = D.articles.authorEmail[r]; if (ref < 0) continue; let g = byEmail.get(ref); if (!g) { g = []; byEmail.set(ref, g); } g.push(r); }
    const onlyFlagged = $("fFlaggedOnly").checked;
    const idSearch = parseArticleIdSearch($("fSearch").value);
    const q = searchTextQuery();
    const sort = $("fSort").value;
    let units = [];
    for (const [ref, rows] of byEmail) {
      const fr = metaFilteredRows(rows);
      if (!fr.length) continue;
      if (onlyFlagged && !hasFlagged(fr)) continue;
      if (shouldHideAllRejectedCluster(fr)) continue;
      if (idSearch) { if (!rowsMatchArticleSearch(fr, idSearch)) continue; }
      else if (q && !(str("emails", ref) || "").toLowerCase().includes(q)) continue;
      const dc = distinctCounts(fr);
      units.push({ kind: "single", key: "email:" + ref, attr: "email", ref, rows: fr, nNames: dc.nNames, nOrgs: dc.nOrgs });
    }
    units.sort((a, b) => sort === "authors" ? b.nNames - a.nNames || b.rows.length - a.rows.length
      : sort === "orgs" ? b.nOrgs - a.nOrgs || b.rows.length - a.rows.length
      : b.rows.length - a.rows.length);
    return units;
  }
  if (act.length === 1 && !rx)
    return currentBuckets().map(b => ({ kind: "single", key: b.attr + ":" + b.ref, attr: b.attr, ref: b.ref, rows: b.rows, nNames: b.nNames, nOrgs: b.nOrgs }));
  const diffA = $("fDiffAuthors").checked, diffO = $("fDiffOrgs").checked;
  const onlyFlagged = $("fFlaggedOnly").checked;
  const minSize = Math.max(2, parseInt($("fMinSize").value) || 2);
  const idSearch = parseArticleIdSearch($("fSearch").value);
  const q = searchTextQuery();
  const sort = $("fSort").value;
  let units = computeCombos().filter(u => {
    if (u.rows.length < minSize) return false;
    if (diffA && u.nNames < 2) return false;
    if (diffO && u.nOrgs < 2) return false;
    if (onlyFlagged && !hasFlagged(u.rows)) return false;
    if (shouldHideAllRejectedCluster(u.rows)) return false;
    if (idSearch) return rowsMatchArticleSearch(u.rows, idSearch);
    if (q) return u.parts.some(p => (str(ATTR_META[p.attr].pool, p.ref) || "").toLowerCase().includes(q));
    return true;
  });
  units.sort((a, b) => sort === "authors" ? b.nNames - a.nNames || b.rows.length - a.rows.length
    : sort === "orgs" ? b.nOrgs - a.nOrgs || b.rows.length - a.rows.length
    : b.rows.length - a.rows.length);
  return units;
}

    ["IP", artStr("ip", r) || "—", artStr("ip", r) !== strFull("ips", A("ip", r)) ? strFull("ips", A("ip", r)) : ""], ["Locale", artStr("locale", r) || "—"],
    ["Platform / UA", [artStr("platform", r), artStr("uaFamily", r)].filter(Boolean).join(" / ") || "—"], ["Submission IP (author record)", artStr("authorIp", r) || "—"],
  ];
  $("detail").innerHTML = flagControlHtml(r) + `<div class="section"><dl class="dl">${rows.map(([k, v, tip, html]) => {
    if (html) return `<div><dt>${k}</dt><dd>${html}</dd></div>`;
    const titleAttr = tip && tip !== v ? ` title="${escapeHtml(tip)}"` : "";
    return `<div><dt>${k}</dt><dd${titleAttr}>${escapeHtml(String(v))}</dd></div>`;
  }).join("")}</dl></div>
    <div class="section"><h2>Shared connections</h2>${connectionsHtml(r)}</div>`;
  bindAidClicks();
  const fb = document.getElementById("flagBtn");
  if (fb) fb.addEventListener("click", () => toggleFlag(A("id", r), () => showPaperDetail(r)));
  const fcb = document.getElementById("flagCommentBtn");
  if (fcb) fcb.addEventListener("click", () => saveComment(A("id", r), () => showPaperDetail(r)));
}
function connectionsHtml(r) {
  const out = [];
  for (const attr of attrs) {
    const ref = D.articles[col(attr)][r]; if (ref < 0) continue;
    const key = attr + ":" + ref, members = indexMap.get(key);
    if (!members || members.length < 2) continue;
    const meta = ATTR_META[attr], full = strFull(meta.pool, ref), shown = str(meta.pool, ref);
    const others = members.filter(x => x !== r);
    out.push(`<div class="conn"><div class="ch" data-hub="${key}"><span class="attrsq" style="background:${meta.color}"></span>
        <b>${meta.label}</b> <span class="muted">· ${members.length} papers · drill in</span></div>
      <div class="muted val" style="margin-top:3px" title="${escapeHtml(full)}">${escapeHtml(shown)}</div>
      <div class="cids">${others.slice(0, 40).map(x => `<span class="aid" data-r="${x}">${A("id", x)}</span>`).join("")}</div></div>`);
  }
  return out.length ? out.join("") : `<div class="muted">No shared attributes retained (all too common or unique).</div>`;
}
function bindAidClicks() {
  document.querySelectorAll("#detail .aid").forEach(el => el.addEventListener("click", () => focusPaper(+el.dataset.r)));
  document.querySelectorAll("#detail .ch[data-hub]").forEach(el => el.addEventListener("click", () => focusHub(el.dataset.hub)));
}
function focusPaper(r) {
  let idx = nodes.findIndex(n => n.type === "paper" && n.r === r);
  if (idx < 0) {
    // drill into the paper's strongest connection so it appears on the graph
    let best = null, bestN = -1;
    for (const attr of activeAttrs()) { const ref = D.articles[col(attr)][r]; if (ref < 0) continue; const k = attr + ":" + ref; const mm = indexMap.get(k); if (mm && mm.length > bestN) { bestN = mm.length; best = k; } }
    if (best) { focusHub(best); idx = nodes.findIndex(n => n.type === "paper" && n.r === r); }
  }
  if (idx >= 0) selected = idx;
  showPaperDetail(r); draw(); syncShare(); syncCmpHighlight();
}
const escapeHtml = (s) => s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

// -------- compare modal --------
function currentPapers() {
  let rs = nodes.filter(n => n.type === "paper").map(n => n.r);
  if (!rs.length && selectedBucketKey && bucketMeta.get(selectedBucketKey)) rs = bucketMeta.get(selectedBucketKey).rows.slice();
  return [...new Set(rs)];
}
let cmpState = null;                        // { rs, shared }
let cmpSelected = new Set();                // row indices selected for bulk flag
let cmpHighlightR = null;                   // snapshot row idx highlighted in compare table
let cmpSort = { key: "pmScore", dir: -1 };  // dir: 1 asc, -1 desc
const selectedPaperRow = () => (selected != null && nodes[selected] && nodes[selected].type === "paper") ? nodes[selected].r : null;
function syncCmpHighlight() {
  if (!$("modal").classList.contains("open")) return;
  cmpHighlightR = selectedPaperRow();
  renderCompareTable();
}
function selectCompareRow(r) {
  cmpHighlightR = r;
  renderCompareTable();
  const idx = nodes.findIndex(n => n.type === "paper" && n.r === r);
  if (idx >= 0) {
    selected = idx;
    showPaperDetail(r);
    draw();
    syncShare();
  }
}
function applyCompareSelectionToGraph() {
  if (cmpHighlightR == null) return;
  const idx = nodes.findIndex(n => n.type === "paper" && n.r === cmpHighlightR);
  if (idx >= 0) {
    selected = idx;
    showPaperDetail(cmpHighlightR);
    draw();
  }
}
function syncCmpBulkBar() {
  if (!FC) return;
  const n = cmpSelected.size;
  const bar = $("cmpBulkBar");
  if (bar) bar.classList.toggle("visible", n > 0);
  const el = $("cmpBulkCount");
  if (el) el.textContent = n ? `${n} selected` : "0 selected";
  if ($("cmpBulkFlag")) $("cmpBulkFlag").disabled = n === 0;
  if ($("cmpBulkUnflag")) $("cmpBulkUnflag").disabled = n === 0;
}
function cmpVisibleRows() {
  if (!cmpState) return [];
  return compareSortedRows().slice(0, 300);
}
function openCompare() {
  const rs = currentPapers();
  if (!rs.length) { drawOverlay("Select a cluster first, then compare."); return; }
  const CC = cmpCols();
  const shared = {};
  for (const f of CC) {
    if (f === "nameEmailSim") continue; // similarity uses its own color scale, not share highlight
    const counts = new Map();
    for (const r of rs) {
      const v = cmpShareKey(r, f);
      if (v != null) counts.set(v, (counts.get(v) || 0) + 1);
    }
    shared[f] = counts;
  }
  cmpState = { rs, shared };
  cmpSelected = new Set();
  cmpHighlightR = selectedPaperRow();
  cmpSort = { key: "pmScore", dir: -1 };
  $("modalTitle").textContent = "Compare papers";
  $("modalSub").innerHTML = `${rs.length} papers · check rows to bulk-flag · click header to sort · drag header to reorder · <a href="#" class="aid" id="cmpColReset">reset columns</a>`;
  renderCompareTable();
  $("modal").classList.add("open");
  $("modal").setAttribute("aria-hidden", "false");
  syncCmpBulkBar();
  syncShare();
}
function closeModal() {
  if (!$("modal").classList.contains("open")) return;
  $("modal").classList.remove("open");
  $("modal").setAttribute("aria-hidden", "true");
  if ($("cmpBulkBar")) $("cmpBulkBar").classList.remove("visible");
  const tipEl = $("cmpTip"); if (tipEl) tipEl.style.display = "none";
  applyCompareSelectionToGraph();
  syncShare();
}
function cmpValue(r, key) {
  if (key === "id") return A("id", r);
  if (key === "pmScore") return A("pmScore", r) == null ? -1 : A("pmScore", r);
  if (key === "nameEmailSim") return A("nameEmailSim", r) == null ? -1 : A("nameEmailSim", r);
  if (key === "wdStatus") return A("wdStatus", r) || -1;
  return cmpDisplay(r, key);
}
function compareSortedRows() {
  if (!cmpState) return [];
  const { rs } = cmpState, { key, dir } = cmpSort;
  const numeric = key === "id" || key === "pmScore" || key === "nameEmailSim" || key === "wdStatus";
  const deprioritizeRejected = key !== "status";
  return rs.slice().sort((a, b) => {
    if (deprioritizeRejected) {
      const rr = (isRejected(a) ? 1 : 0) - (isRejected(b) ? 1 : 0);
      if (rr) return rr;
    }
    const va = cmpValue(a, key), vb = cmpValue(b, key);
    let c;
    if (numeric) c = va - vb;
    else { const ea = va === "", eb = vb === ""; c = (ea && eb) ? 0 : ea ? 1 : eb ? -1 : String(va).localeCompare(String(vb)); }
    return (c * dir) || (A("id", a) - A("id", b));
  });
}
const tsvCell = (v) => String(v == null ? "" : v).replace(/\t/g, " ").replace(/\r?\n/g, " ");
async function copyCompareTable() {
  if (!cmpState) return;
  const sorted = compareSortedRows();
  const cols = cmpColDefs();
  const headers = (FC ? ["Flagged"] : []).concat(cols.map(([, lbl]) => lbl));
  const lines = [headers.map(tsvCell).join("\t")];
  for (const r of sorted) {
    const cells = FC ? [flags.has(A("id", r)) ? "yes" : ""] : [];
    for (const [k] of cols) cells.push(tsvCell(k === "id" ? A("id", r) : cmpDisplay(r, k)));
    lines.push(cells.map(tsvCell).join("\t"));
  }
  const text = lines.join("\n");
  const btn = $("modalCopy");
  try {
    await navigator.clipboard.writeText(text);
    if (btn) { const prev = btn.textContent; btn.textContent = "Copied!"; setTimeout(() => { btn.textContent = prev; }, 1500); }
  } catch (_) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.left = "-9999px";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); if (btn) { const prev = btn.textContent; btn.textContent = "Copied!"; setTimeout(() => { btn.textContent = prev; }, 1500); } }
    catch (e) { alert("Copy failed — try again or use a secure (https) context."); }
    document.body.removeChild(ta);
  }
}
function renderCompareTable() {
  if (!cmpState) return;
  const { shared } = cmpState, { key } = cmpSort;
  const sorted = compareSortedRows();
  const arrow = k => cmpSort.key === k ? (cmpSort.dir < 0 ? " ▼" : " ▲") : "";
  const cols = cmpColDefs();
  const visible = sorted.slice(0, 300);
  const allPicked = visible.length > 0 && visible.every(r => cmpSelected.has(r));
  const pickTh = FC ? `<th class="cmp-pick" title="Select for bulk flag"><input type="checkbox" id="cmpSelectAll"${allPicked ? " checked" : ""}></th>` : "";
  const flagTh = FC ? "<th>⚑</th>" : "";
  const head = "<tr>" + pickTh + flagTh + cols.map(([k, lbl]) => `<th draggable="true" data-sort="${k}" style="cursor:grab;user-select:none" title="Sort by ${lbl} · drag to reorder">${lbl}${arrow(k)}</th>`).join("") + "</tr>";
  const body = visible.map(r => {
    const ff = flags.get(A("id", r));
    const picked = cmpSelected.has(r);
    const pickTd = FC ? `<td class="cmp-pick"><input type="checkbox" class="cmp-pick-cb" data-r="${r}"${picked ? " checked" : ""}></td>` : "";
    const flagTd = FC ? `<td class="flagcell" data-fr="${r}" style="cursor:pointer;text-align:center" title="${ff && ff.comment ? escapeHtml(ff.comment) : "Toggle manufactured flag"}">${ff ? '<span style="color:#D51A2C">⚑</span>' : '<span class="muted">⚐</span>'}</td>` : "";
    const cells = cols.map(([k]) => {
      if (k === "id") {
        const aid = A("id", r);
        return `<td><a class="aid" href="${reviewUrl(aid)}" target="_blank" rel="noopener" title="Open in Frontiers review">${aid}</a></td>`;
      }
      const sk = cmpShareKey(r, k);
      const sh = sk != null && shared[k] && shared[k].get(sk) >= 2;
      const cc = sh && ATTR_META[k] ? ATTR_META[k].color : (sh ? "#8ab4ff" : "");
      if (k === "nameEmailSim") {
        const sim = A("nameEmailSim", r);
        const sty = nameEmailSimStyle(sim);
        const inner = sim == null ? '<span class="muted">—</span>' : escapeHtml(nameEmailSimText(sim));
        const colorStyle = sty ? `color:${sty.color};font-weight:600` : "";
        const tip = sty ? sty.hint : "";
        const tipCls = tip ? " cmp-tip" : "";
        const dataFull = tip ? ` data-full="${escapeHtml(tip)}"` : "";
        return `<td data-col="${k}" class="${tipCls}" style="${colorStyle}"${dataFull}>${inner}</td>`;
      }
      const v = cmpDisplay(r, k);
      const shown = cmpDisplayShort(r, k);
      const tip = v && shown !== v ? v : "";
      const tipCls = tip ? " cmp-tip" : "";
      const dataFull = tip ? ` data-full="${escapeHtml(tip)}"` : "";
      const inner = shown ? escapeHtml(shown) : '<span class="muted">—</span>';
      return `<td data-col="${k}" class="${sh ? "share" : ""}${tipCls}" style="${sh ? `color:${cc}` : ""}"${dataFull}>${inner}</td>`;
    }).join("");
    return `<tr data-r="${r}" class="${r === cmpHighlightR ? "sel" : ""}${picked ? " cmp-picked" : ""}">${pickTd}${flagTd}${cells}</tr>`;
  }).join("");
  const box = $("modalBody");
  box.innerHTML = `<table class="cmp"><thead>${head}</thead><tbody>${body}</tbody></table>`;
  if (cmpHighlightR != null) requestAnimationFrame(() => {
    const row = box.querySelector("tbody tr.sel");
    if (row) row.scrollIntoView({ block: "nearest" });
  });
  box.querySelectorAll("th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const k = th.dataset.sort;
      if (cmpSort.key === k) cmpSort.dir *= -1; else cmpSort = { key: k, dir: k === "id" ? 1 : -1 };
      renderCompareTable();
    });
    th.addEventListener("dragstart", e => {
      cmpDragKey = th.dataset.sort;
      e.dataTransfer.effectAllowed = "move";
      th.classList.add("drag-over");
    });
    th.addEventListener("dragend", () => {
      cmpDragKey = null;
      box.querySelectorAll("th.drag-over").forEach(el => el.classList.remove("drag-over"));
    });
    th.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; th.classList.add("drag-over"); });
    th.addEventListener("dragleave", () => th.classList.remove("drag-over"));
    th.addEventListener("drop", e => {
      e.preventDefault();
      th.classList.remove("drag-over");
      const target = th.dataset.sort;
      if (!cmpDragKey || cmpDragKey === target) return;
      const order = activeCmpColOrder().slice();
      const from = order.indexOf(cmpDragKey), to = order.indexOf(target);
      if (from < 0 || to < 0) return;
      order.splice(from, 1);
      order.splice(to, 0, cmpDragKey);
      cmpColOrder = order;
      saveCmpColOrder(order);
      cmpDragKey = null;
      renderCompareTable();
    });
  });
  box.querySelectorAll(".flagcell").forEach(td => td.addEventListener("click", () => toggleFlag(A("id", +td.dataset.fr))));
  const selAll = box.querySelector("#cmpSelectAll");
  if (selAll) {
    selAll.addEventListener("click", e => {
      e.stopPropagation();
      const on = selAll.checked;
      for (const r of visible) { if (on) cmpSelected.add(r); else cmpSelected.delete(r); }
      syncCmpBulkBar();
      renderCompareTable();
    });
  }
  box.querySelectorAll(".cmp-pick-cb").forEach(cb => {
    cb.addEventListener("click", e => e.stopPropagation());
    cb.addEventListener("change", () => {
      const r = +cb.dataset.r;
      if (cb.checked) cmpSelected.add(r); else cmpSelected.delete(r);
      syncCmpBulkBar();
      const tr = cb.closest("tr");
      if (tr) tr.classList.toggle("cmp-picked", cb.checked);
      const all = box.querySelector("#cmpSelectAll");
      if (all) all.checked = visible.length > 0 && visible.every(x => cmpSelected.has(x));
    });
  });
  bindCmpTooltips();
  syncCmpBulkBar();
}
const reviewUrl = (id) => `https://review.frontiersin.org/review/${id}/0/0`;

// -------- share url --------
function syncShare() {
  const p = new URLSearchParams();
  const act = activeAttrs();
  if (act.slice().sort().join(",") !== [...DEFAULT_ACTIVE_ATTRS].sort().join(",")) p.set("at", act.join(","));
  if (!$("fDiffAuthors").checked) p.set("da", "0");
  if (!$("fDiffOrgs").checked) p.set("do", "0");
  if ($("fFlaggedOnly").checked) p.set("fl", "1");
  if (!$("fHideAllRejected").checked) p.set("har", "0");
  if ($("fLowNameEmailSim")?.checked) p.set("nes", "1");
  const jn = $("fJournal") ? $("fJournal").value : ""; if (jn) p.set("jn", jn);
  const sta = $("fStatus") ? $("fStatus").value : ""; if (sta) p.set("sta", sta);
  const ms = $("fMinSize").value; if (ms && ms !== "2") p.set("ms", ms);
  const st = $("fSort").value; if (st && st !== "size") p.set("st", st);
  const q = $("fSearch").value.trim(); if (q) p.set("q", q);
  const re = $("fEmailRegex").value.trim(); if (re) p.set("re", re);
  if (mode === "focus" && focusKey) p.set("c", focusKey);
  if (selected != null && nodes[selected] && nodes[selected].type === "paper") p.set("a", A("id", nodes[selected].r));
  if ($("modal").classList.contains("open")) p.set("cmp", "1");
  const qs = p.toString();
  history.replaceState(null, "", qs ? "?" + qs : location.pathname);
}
function applyShareParams() {
  const p = new URLSearchParams(location.search);
  if (p.has("at")) {
    const want = new Set(p.get("at") ? p.get("at").split(",") : []);
    document.querySelectorAll("#attrToggles input").forEach(i => i.checked = want.has(i.dataset.attr));
  }
  if (p.has("da")) $("fDiffAuthors").checked = p.get("da") !== "0";
  if (p.has("do")) $("fDiffOrgs").checked = p.get("do") !== "0";
  if (p.has("fl")) $("fFlaggedOnly").checked = p.get("fl") === "1";
  if (p.has("har")) $("fHideAllRejected").checked = p.get("har") !== "0";
  if (p.get("nes") === "1" && $("fLowNameEmailSim")) $("fLowNameEmailSim").checked = true;
  if (p.get("jn") && $("fJournal")) $("fJournal").value = p.get("jn");
  if (p.get("sta") && $("fStatus")) $("fStatus").value = p.get("sta");
  if (p.get("ms")) $("fMinSize").value = p.get("ms");
  if (p.get("st")) $("fSort").value = p.get("st");
  if (p.get("q")) $("fSearch").value = p.get("q");
  if (p.get("re")) $("fEmailRegex").value = p.get("re");
  rebuildEmailFilter();
  if (p.get("c") && bucketMeta.has(p.get("c"))) focusHub(p.get("c"));
  else if (maybeFocusArticleSearch()) { /* article search from q= */ }
  else if (p.get("a") && D.articles.id.indexOf(+p.get("a")) >= 0) focusPaper(D.articles.id.indexOf(+p.get("a")));
  else showOverview();
  if (p.get("cmp")) openCompare();
}

initCollapsibleSections();
boot();
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paper Connection Audit</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --line: #2a2f3a;
    --text: #e6e8ec; --muted: #9aa3b2; --accent: #3673f7;
    --green: #65C161; --orange: #E87626; --red: #D51A2C; --grey: #6b7280;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #app { display: grid; grid-template-columns: 330px 1fr 340px; height: 100vh; }
  .col { overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  #left { border-right: 1px solid var(--line); background: var(--panel); }
  #right { border-left: 1px solid var(--line); background: var(--panel); }
  #center { position: relative; }
  header { padding: 12px 14px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 14px; margin: 0 0 2px; letter-spacing: .2px; }
  header .sub { color: var(--muted); font-size: 11px; }
  .scroll { overflow-y: auto; flex: 1; min-height: 0; }
  .section { padding: 10px 14px; border-bottom: 1px solid var(--line); }
  .section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); margin: 0 0 8px; }
  label.chk { display: flex; align-items: center; gap: 7px; padding: 3px 0; cursor: pointer; }
  label.chk input { accent-color: var(--accent); }
  .attrdot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .attrsq { width: 9px; height: 9px; flex: none; border-radius: 2px; }
  .row { display: flex; gap: 8px; align-items: center; margin: 6px 0; }
  .row label { color: var(--muted); flex: none; min-width: 92px; }
  input[type=text], input[type=number], select {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 8px; width: 100%; font-size: 12px; }
  .bucket { padding: 8px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .bucket:hover { background: var(--panel2); }
  .bucket.sel { background: #232a3a; box-shadow: inset 3px 0 0 var(--accent); }
  .bucket .b1 { display: flex; align-items: center; gap: 7px; }
  .bucket .val { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bucket .b2 { color: var(--muted); font-size: 11px; margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--panel2); border: 1px solid var(--line); }
  .pill.warn { color: var(--orange); border-color: var(--orange); }
  .pill.bad { color: var(--red); border-color: var(--red); }
  canvas { display: block; width: 100%; height: 100%; }
  #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; color: var(--muted); pointer-events: none; padding: 24px; }
  #topbar { position: absolute; top: 0; left: 0; right: 0; padding: 8px 12px; display: flex;
    gap: 8px; align-items: center; background: linear-gradient(#0f1115ee, #0f111500);
    pointer-events: none; font-size: 12px; }
  #topbar .btn, #topbar .crumb { pointer-events: auto; }
  .btn { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
  .btn:hover { border-color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: default; }
  .crumb { color: var(--muted); }
  .crumb b { color: var(--text); }
  .legend { position: absolute; bottom: 10px; left: 12px; display: flex; gap: 12px; flex-wrap: wrap;
    font-size: 11px; color: var(--muted); background: #0f1115cc; padding: 6px 10px; border-radius: 8px; max-width: 70%; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .sq { width: 9px; height: 9px; border-radius: 2px; }
  .dl { margin: 0; }
  .dl div { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--line); }
  .dl dt { color: var(--muted); flex: none; width: 108px; }
  .dl dd { margin: 0; word-break: break-word; }
  .conn { padding: 7px 0; border-bottom: 1px solid var(--line); }
  .conn .ch { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .conn .cids { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 5px; }
  .aid { font-family: ui-monospace, monospace; font-size: 11px; color: var(--accent); cursor: pointer; }
  .aid:hover { text-decoration: underline; }
  .muted { color: var(--muted); }
  .empty { padding: 24px 14px; color: var(--muted); text-align: center; }
  .count { color: var(--muted); font-size: 11px; }
  /* modal */
  #modal { position: fixed; inset: 0; background: #000a; display: none; align-items: center; justify-content: center; z-index: 50; }
  #modal.open { display: flex; }
  .modalbox { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    width: min(1200px, 94vw); height: min(80vh, 800px); display: flex; flex-direction: column; }
  .modalhead { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; }
  .modalhead h2 { margin: 0; font-size: 14px; }
  .modalbody { overflow: auto; flex: 1; }
  table.cmp { border-collapse: collapse; font-size: 12px; width: 100%; }
  table.cmp th, table.cmp td { border: 1px solid var(--line); padding: 5px 8px; text-align: left; white-space: nowrap;
    max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
  table.cmp thead th { position: sticky; top: 0; background: var(--panel2); z-index: 1; }
  table.cmp td.share { font-weight: 600; }
  table.cmp tr:hover td { background: #ffffff08; }
  .close { margin-left: auto; }
</style>
</head>
<body>
<div id="app">
  <div id="left" class="col">
    <header>
      <h1>Paper Connection Audit</h1>
      <div class="sub" id="meta">loading…</div>
    </header>
    <div class="section">
      <h2>Connection type</h2>
      <div id="attrToggles"></div>
    </div>
    <div class="section">
      <h2>Filters</h2>
      <label class="chk"><input type="checkbox" id="fDiffAuthors"> Different submitting authors</label>
      <label class="chk"><input type="checkbox" id="fDiffOrgs"> Different organisations</label>
      <div class="row"><label>Min papers</label><input type="number" id="fMinSize" value="2" min="2" style="width:70px"></div>
      <div class="row"><label>Sort by</label>
        <select id="fSort">
          <option value="size">Most papers</option>
          <option value="authors">Most distinct authors</option>
          <option value="orgs">Most distinct organisations</option>
        </select>
      </div>
      <div class="row"><label>Search</label><input type="text" id="fSearch" placeholder="value or article id"></div>
      <div class="row"><label>Email regex</label><input type="text" id="fEmailRegex" placeholder="e.g. \d{4,}@  or  @(163|qq|126)\."></div>
      <div id="emailErr" style="color:var(--red);font-size:11px;min-height:14px"></div>
    </div>
    <div class="section" style="padding-bottom:6px"><h2 style="margin:0"><span id="listTitle">Connections</span> <span class="count" id="bucketCount"></span></h2></div>
    <div class="scroll" id="bucketList"></div>
  </div>

  <div id="center" class="col">
    <canvas id="cv"></canvas>
    <div id="topbar">
      <button class="btn" id="btnOverview">◂ Overview</button>
      <span class="crumb" id="crumb"></span>
      <span style="flex:1"></span>
      <button class="btn" id="btnCompare">Compare papers</button>
      <button class="btn" id="btnRelayout">Re-layout</button>
    </div>
    <div id="overlay"></div>
    <div class="legend" id="legend"></div>
  </div>

  <div id="right" class="col">
    <header><h1 id="detailTitle">Details</h1><div class="sub" id="detailSub">Click a cluster, then a paper.</div></header>
    <div class="scroll" id="detail"><div class="empty">Nothing selected.</div></div>
  </div>
</div>

<div id="modal">
  <div class="modalbox">
    <div class="modalhead">
      <h2 id="modalTitle">Compare papers</h2>
      <span class="muted" id="modalSub"></span>
      <button class="btn close" id="modalClose">Close</button>
    </div>
    <div class="modalbody" id="modalBody"></div>
  </div>
</div>

<script>
"use strict";
// -------- config (tune here) --------
const NODE_CAP = 400;          // hard cap on rendered nodes (papers + hubs)
const OVERVIEW_HUBS = 140;     // clusters shown in the high-level overview
const SECONDARY_HUBS = 40;     // neighbouring clusters shown when drilling in
const LAYOUT_ITERS = 170;

// -------- attribute display config --------
const ATTR_META = {
  email:      { label: "Email",              pool: "emails",      color: "#22d3ee" },
  ip:         { label: "IP address",         pool: "ips",         color: "#a78bfa" },
  device:     { label: "Device fingerprint", pool: "devices",     color: "#f472b6" },
  locale:     { label: "Language + timezone",pool: "locales",     color: "#60a5fa" },
  wdAuthor:   { label: "Word: author",       pool: "wdAuthors",   color: "#f59e0b" },
  wdEditedBy: { label: "Word: last edited by",pool: "wdEditedBys",color: "#fbbf24" },
  wdCompany:  { label: "Word: company",      pool: "wdCompanies", color: "#fcd34d" },
  authorIp:   { label: "Author-declared IP", pool: "authorIps",   color: "#c084fc" },
};
const ATTR_COL = { email: "authorEmail" };
const col = (a) => ATTR_COL[a] || a;
const COMBO_COLOR = "#a3e635";
const BAND_COLORS = ["#6b7280", "#65C161", "#E87626", "#D51A2C"];
const BAND_NAMES  = ["no score", "low", "medium", "high"];
const STATUS_NAMES = ["", "green", "yellow", "red", "gold", "n/a", "unchecked"];
const PATTERN_NAMES = ["", "all-digits", "name.surname", "all-alpha", "alpha+digits", "other"];
const CMP_COLS = ["authorName","authorEmail","authorOrg","device","ip","locale","wdAuthor","wdEditedBy","wdCompany","authorIp"];

// -------- state --------
let D = null, attrs = [];
let indexMap = new Map();     // "attr:ref" -> [rows]
let keptSet = new Set();
let bucketMeta = new Map();   // "attr:ref" -> {rows,nNames,nOrgs}
let buckets = [];
let mode = "overview";        // overview | focus
let focusKey = null;
let selectedBucketKey = null;
let nodes = [], edges = [], adj = [];
let selected = null;          // node index highlighted
let view = { x: 0, y: 0, k: 1 };

const $ = (id) => document.getElementById(id);
const str = (pool, ref) => (ref == null || ref < 0) ? "" : (D.dict[pool] ? D.dict[pool][ref] : "");
const A = (c, r) => D.articles[c][r];
const POOLS = { title:"titles", authorName:"names", authorEmail:"emails", authorOrg:"orgs",
  platform:"platforms", uaFamily:"uaFamilies", ip:"ips", device:"devices", locale:"locales",
  wdAuthor:"wdAuthors", wdEditedBy:"wdEditedBys", wdCompany:"wdCompanies", authorIp:"authorIps" };
const artStr = (f, r) => str(POOLS[f], A(f, r));
const valOf = (key) => { const i = key.indexOf(":"), a = key.slice(0, i); return str(ATTR_META[a].pool, +key.slice(i + 1)); };
const attrOf = (key) => key.slice(0, key.indexOf(":"));

async function fetchSnapshot(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${url}: ${res.status}`);
  if (url.endsWith(".gz")) {
    if (typeof DecompressionStream === "undefined") throw new Error("Browser lacks DecompressionStream");
    return await new Response(res.body.pipeThrough(new DecompressionStream("gzip"))).json();
  }
  return await res.json();
}

async function boot() {
  try { D = await fetchSnapshot("data/snapshot.json.gz"); }
  catch (e) { $("meta").textContent = "Failed to load snapshot — serve over http (not file://). " + e.message; return; }
  attrs = D.meta.attributes.filter(a => a !== "authorIp");
  for (const attr of attrs)
    for (const [ref, rows, nN, nO] of (D.index[attr] || [])) {
      const key = attr + ":" + ref;
      indexMap.set(key, rows); keptSet.add(key);
      bucketMeta.set(key, { rows, nNames: nN, nOrgs: nO });
      buckets.push({ attr, ref, rows, nNames: nN, nOrgs: nO });
    }
  const m = D.meta;
  $("meta").textContent = `${m.count.toLocaleString()} papers · ${m.buckets.toLocaleString()} connections · ${m.windowDays}-day window`;
  buildAttrToggles(); bindUI(); renderList(); setupCanvas(); buildLegend();
  showOverview();
  applyShareParams();
}

function buildAttrToggles() {
  const box = $("attrToggles"); box.innerHTML = "";
  for (const attr of attrs) {
    const meta = ATTR_META[attr] || { label: attr, color: "#888" };
    const l = document.createElement("label"); l.className = "chk";
    l.innerHTML = `<input type="checkbox" data-attr="${attr}" checked>
      <span class="attrsq" style="background:${meta.color}"></span>${meta.label}`;
    box.appendChild(l);
  }
  box.addEventListener("change", () => { showOverview(); });
}
const activeAttrs = () => [...document.querySelectorAll("#attrToggles input:checked")].map(i => i.dataset.attr);

function bindUI() {
  ["fDiffAuthors","fDiffOrgs","fMinSize","fSort","fSearch"].forEach(id => $(id).addEventListener("input", () => { renderList(); if (mode === "overview") showOverview(); }));
  $("fEmailRegex").addEventListener("input", renderList);
  $("btnOverview").addEventListener("click", showOverview);
  $("btnRelayout").addEventListener("click", () => { if (nodes.length) runLayout(); });
  $("btnCompare").addEventListener("click", openCompare);
  $("modalClose").addEventListener("click", () => $("modal").classList.remove("open"));
  $("modal").addEventListener("click", e => { if (e.target.id === "modal") $("modal").classList.remove("open"); });
  window.addEventListener("keydown", e => { if (e.key === "Escape") $("modal").classList.remove("open"); });
}

function buildLegend() {
  const parts = ['<span class="muted">papers:</span>'];
  BAND_NAMES.forEach((n, i) => parts.push(`<span><i class="dot" style="background:${BAND_COLORS[i]}"></i>${n}</span>`));
  parts.push('<span class="muted">| clusters:</span>');
  for (const a of attrs) parts.push(`<span><i class="sq" style="background:${ATTR_META[a].color}"></i>${ATTR_META[a].label}</span>`);
  parts.push(`<span><i class="sq" style="background:${COMBO_COLOR}"></i>multi-type (AND)</span>`);
  $("legend").innerHTML = parts.join("");
}

// -------- bucket list --------
function currentBuckets() {
  const act = new Set(activeAttrs());
  const diffA = $("fDiffAuthors").checked, diffO = $("fDiffOrgs").checked;
  const minSize = Math.max(2, parseInt($("fMinSize").value) || 2);
  const q = $("fSearch").value.trim().toLowerCase();
  const qid = /^\d+$/.test(q) ? parseInt(q) : null;
  const sort = $("fSort").value;
  let list = buckets.filter(b => {
    if (!act.has(b.attr)) return false;
    if (b.rows.length < minSize) return false;
    if (diffA && b.nNames < 2) return false;
    if (diffO && b.nOrgs < 2) return false;
    if (q) {
      if (qid != null) return b.rows.some(r => A("id", r) === qid);
      return str(ATTR_META[b.attr].pool, b.ref).toLowerCase().includes(q);
    }
    return true;
  });
  list.sort((a, b) => sort === "authors" ? b.nNames - a.nNames || b.rows.length - a.rows.length
    : sort === "orgs" ? b.nOrgs - a.nOrgs || b.rows.length - a.rows.length
    : b.rows.length - a.rows.length);
  return list;
}
function activeEmailRegex() {
  const raw = $("fEmailRegex").value.trim();
  if (!raw) { $("emailErr").textContent = ""; return null; }
  try { const re = new RegExp(raw, "i"); $("emailErr").textContent = ""; return re; }
  catch (e) { $("emailErr").textContent = "Invalid regex: " + e.message; return "ERR"; }
}
function renderList() {
  const re = activeEmailRegex();
  if (re && re !== "ERR") renderEmailMatches(re);
  else renderUnits();
}
function renderEmailMatches(re) {
  const emails = D.dict.emails || [];
  const match = new Set();
  for (let i = 0; i < emails.length; i++) if (re.test(emails[i])) match.add(i);
  const c = D.articles.authorEmail, rows = [];
  for (let r = 0; r < c.length; r++) { const ref = c[r]; if (ref >= 0 && match.has(ref)) rows.push(r); }
  rows.sort((a, b) => (A("pmScore", b) || 0) - (A("pmScore", a) || 0));
  $("listTitle").textContent = "Email matches";
  $("bucketCount").textContent = `(${rows.length.toLocaleString()})`;
  const box = $("bucketList");
  if (!rows.length) {
    box.innerHTML = `<div class="empty">No emails match <code>${escapeHtml(re.source)}</code>.<br>
      <span class="muted">${emails.length.toLocaleString()} distinct author emails in this snapshot.</span></div>`;
    return;
  }
  box.innerHTML = rows.slice(0, 600).map(emailRowHtml).join("");
  box.querySelectorAll(".aid").forEach(el => el.addEventListener("click", () => focusPaper(+el.dataset.r)));
}
function emailRowHtml(r) {
  const em = artStr("authorEmail", r), nm = artStr("authorName", r);
  return `<div class="bucket"><div class="b1"><span class="attrsq" style="background:${ATTR_META.email.color}"></span>
      <span class="aid" data-r="${r}">${A("id", r)}</span><span class="muted" style="font-size:11px"> · ${bandLabel(r)}</span></div>
    <div class="val" title="${escapeHtml(em)}">${escapeHtml(em)}</div>
    ${nm ? `<div class="b2"><span class="muted">${escapeHtml(nm)}</span></div>` : ""}</div>`;
}
function distinctCounts(rows) {
  const nm = new Set(), og = new Set();
  for (const r of rows) { const a = A("authorName", r); if (a >= 0) nm.add(a); const o = A("authorOrg", r); if (o >= 0) og.add(o); }
  return { nNames: nm.size, nOrgs: og.size };
}
const andMode = () => activeAttrs().length >= 2;
const comboLabel = (u) => { const v = str(ATTR_META[u.parts[0].attr].pool, u.parts[0].ref) || ""; return (v.length > 16 ? v.slice(0, 16) + "…" : v) + (u.parts.length > 1 ? ` +${u.parts.length - 1}` : ""); };

// AND: group papers that share the SAME value on EVERY selected attribute.
function computeCombos() {
  const act = activeAttrs(), cols = act.map(a => D.articles[col(a)]), n = D.articles.id.length;
  const groups = new Map();
  for (let r = 0; r < n; r++) {
    let key = "", ok = true;
    for (let i = 0; i < act.length; i++) { const ref = cols[i][r]; if (ref < 0) { ok = false; break; } key += act[i] + "#" + ref + "|"; }
    if (!ok) continue;
    let g = groups.get(key); if (!g) { g = []; groups.set(key, g); } g.push(r);
  }
  const units = [];
  for (const [key, rows] of groups) {
    if (rows.length < 2) continue;
    const parts = act.map(a => ({ attr: a, ref: D.articles[col(a)][rows[0]] }));
    const dc = distinctCounts(rows);
    units.push({ kind: "combo", key: "combo|" + key, parts, rows, nNames: dc.nNames, nOrgs: dc.nOrgs });
  }
  return units;
}

function currentUnits() {
  const act = activeAttrs();
  if (act.length === 0) return [];
  if (act.length === 1)
    return currentBuckets().map(b => ({ kind: "single", key: b.attr + ":" + b.ref, attr: b.attr, ref: b.ref, rows: b.rows, nNames: b.nNames, nOrgs: b.nOrgs }));
  const diffA = $("fDiffAuthors").checked, diffO = $("fDiffOrgs").checked;
  const minSize = Math.max(2, parseInt($("fMinSize").value) || 2);
  const q = $("fSearch").value.trim().toLowerCase();
  const qid = /^\d+$/.test(q) ? parseInt(q) : null;
  const sort = $("fSort").value;
  let units = computeCombos().filter(u => {
    if (u.rows.length < minSize) return false;
    if (diffA && u.nNames < 2) return false;
    if (diffO && u.nOrgs < 2) return false;
    if (q) return qid != null ? u.rows.some(r => A("id", r) === qid)
      : u.parts.some(p => (str(ATTR_META[p.attr].pool, p.ref) || "").toLowerCase().includes(q));
    return true;
  });
  units.sort((a, b) => sort === "authors" ? b.nNames - a.nNames || b.rows.length - a.rows.length
    : sort === "orgs" ? b.nOrgs - a.nOrgs || b.rows.length - a.rows.length
    : b.rows.length - a.rows.length);
  return units;
}

function renderUnits() {
  const list = currentUnits();
  $("listTitle").textContent = andMode() ? "Multi-type clusters" : "Connections";
  $("bucketCount").textContent = `(${list.length.toLocaleString()})`;
  const box = $("bucketList"); box.innerHTML = "";
  if (!list.length) {
    box.innerHTML = andMode()
      ? `<div class="empty">No papers share all ${activeAttrs().length} selected types.<br><span class="muted">Try fewer types — not every paper carries every attribute.</span></div>`
      : (activeAttrs().length ? `<div class="empty">No connections match the filters.</div>` : `<div class="empty">Select at least one connection type.</div>`);
    return;
  }
  const frag = document.createDocumentFragment();
  for (const u of list.slice(0, 600)) {
    const el = document.createElement("div");
    el.className = "bucket" + (u.key === selectedBucketKey ? " sel" : "");
    el.innerHTML = unitRowInner(u);
    el.addEventListener("click", () => focusUnit(u));
    frag.appendChild(el);
  }
  box.appendChild(frag);
}
function unitRowInner(u) {
  const authPill = u.nNames >= 2 ? `<span class="pill bad">${u.nNames} authors</span>` : (u.nNames ? `<span class="pill">1 author</span>` : "");
  const orgPill = u.nOrgs >= 2 ? `<span class="pill warn">${u.nOrgs} orgs</span>` : "";
  if (u.kind === "single") {
    const meta = ATTR_META[u.attr], val = str(meta.pool, u.ref) || "(empty)";
    return `<div class="b1"><span class="attrsq" style="background:${meta.color}"></span>
        <span class="muted" style="font-size:11px">${meta.label}</span></div>
      <div class="val" title="${val.replace(/"/g,'&quot;')}">${val}</div>
      <div class="b2"><span class="pill">${u.rows.length} papers</span>${authPill}${orgPill}</div>`;
  }
  const dots = u.parts.map(p => `<span class="attrsq" style="background:${ATTR_META[p.attr].color}" title="${ATTR_META[p.attr].label}"></span>`).join("");
  const lines = u.parts.map(p => `<div class="val" title="${(str(ATTR_META[p.attr].pool, p.ref) || '').replace(/"/g,'&quot;')}"><span class="muted" style="font-size:10px">${ATTR_META[p.attr].label}:</span> ${str(ATTR_META[p.attr].pool, p.ref) || "(empty)"}</div>`).join("");

      return `<td class="${sh ? "share" : ""}" style="${sh ? `color:${cc}` : ""}" title="${escapeHtml(v)}">${escapeHtml(v) || '<span class="muted">—</span>'}</td>`;
    }).join("");
    return `<tr><td><span class="aid" data-r="${r}">${A("id", r)}</span></td><td>${bandLabel(r)}</td>${cells}</tr>`;
  }).join("");
  const box = $("modalBody");
  box.innerHTML = `<table class="cmp"><thead>${head}</thead><tbody>${body}</tbody></table>`;
  box.querySelectorAll("th[data-sort]").forEach(th => th.addEventListener("click", () => {
    const k = th.dataset.sort;
    if (cmpSort.key === k) cmpSort.dir *= -1; else cmpSort = { key: k, dir: k === "id" ? 1 : -1 };
    renderCompareTable();
  }));
  box.querySelectorAll(".aid").forEach(el => el.addEventListener("click", () => { $("modal").classList.remove("open"); focusPaper(+el.dataset.r); }));
}
function cmpLabel(f) { return ({ authorName: "Author", authorEmail: "Email", authorOrg: "Organisation" })[f] || f; }

// -------- share url --------
function syncShare() {
  const p = new URLSearchParams();
  if (mode === "focus" && focusKey) p.set("c", focusKey);
  if (selected != null && nodes[selected] && nodes[selected].type === "paper") p.set("a", A("id", nodes[selected].r));
  history.replaceState(null, "", "?" + p.toString());
}
function applyShareParams() {
  const p = new URLSearchParams(location.search);
  if (p.get("c") && bucketMeta.has(p.get("c"))) focusHub(p.get("c"));
  if (p.get("a")) { const r = D.articles.id.indexOf(+p.get("a")); if (r >= 0) focusPaper(r); }
}

boot();
</script>
